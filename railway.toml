[build]
  buildCommand = "npm run build"
  watchPatterns = [
    "apps/api/**",
    "libs/**",
    "workspace.json",
    "nx.json",
    "tsconfig.base.json",
    "package.json",
    "package-lock.json"
  ]

[deploy]
  startCommand = "npm start"
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 3
